<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 活力橙色渐变底 -->
    <linearGradient id="bg-vibrant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a76"/>
      <stop offset="50%" stop-color="#e8613c"/>
      <stop offset="100%" stop-color="#b52e0c"/>
    </linearGradient>
    <filter id="shadow-white" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#731802" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 实体背景 -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg-vibrant)"/>
  <rect x="16" y="16" width="224" height="224" rx="52" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>

  <!-- 纯白负空间图形 -->
  <g filter="url(#shadow-white)">
    <!-- 上爪 -->
    <path d="M 145 55 C 120 55 90 70 70 100 C 85 100 105 95 125 110 C 130 95 145 85 165 85 C 170 70 160 55 145 55 Z" fill="#ffffff"/>
    <!-- 侧爪 -->
    <path d="M 60 135 C 65 170 90 195 125 200 C 120 185 110 170 110 150 C 95 145 80 135 75 120 C 65 125 60 130 60 135 Z" fill="#ffffff"/>
    <!-- 右爪 -->
    <path d="M 185 125 C 175 110 155 105 140 120 C 155 135 155 155 140 170 C 160 170 185 150 185 125 Z" fill="#ffffff"/>
  </g>
  <!-- 中心负空间隐喻了一个被抓取的球体 -->
</svg>